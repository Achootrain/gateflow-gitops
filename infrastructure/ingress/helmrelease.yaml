apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kong
  namespace: gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: kong
      version: "2.38.0"
      sourceRef:
        kind: HelmRepository
        name: kong
        # same-namespace ref: required by multiTenancy.enforce
      interval: 1h
  values:
    image:
      repository: kong
      tag: "3.7"
    env:
      database: "off"
      # declarative_config is set by the chart itself when dblessConfig is
      # used (it mounts the ConfigMap and points Kong at it) — overriding the
      # path here would break startup.
      nginx_worker_processes: "1"
    # KIC defaults to enabled and, when on, the chart ignores dblessConfig
    # entirely (routes would come from Ingress CRs instead) — Kong then runs
    # with zero routes and 404s everything. ADR-0003 is static file config.
    ingressController:
      enabled: false
    dblessConfig:
      configMap: kong-dbless-config
    proxy:
      type: LoadBalancer
    nodeSelector:
      kubernetes.io/arch: arm64
      kubernetes.io/os: linux
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 768Mi
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
