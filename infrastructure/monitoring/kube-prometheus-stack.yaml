# All chart images are published as multi-architecture images, including
# linux/arm64. Values intentionally trade retention and dashboards for room on
# the two small system nodes.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "65.5.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        # same-namespace ref: required by multiTenancy.enforce
      interval: 1h
  values:
    defaultRules:
      rules:
        etcd: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    grafana:
      enabled: true
      # Single replica on request-tight nodes — a RollingUpdate surge pod can never schedule.
      deploymentStrategy:
        type: Recreate
      defaultDashboardsEnabled: false
      # Loki has no gateway in our trimmed install — point Grafana straight
      # at the single-binary service.
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      sidecar:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
    alertmanager:
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
    prometheus:
      prometheusSpec:
        retention: 2d
        resources:
          requests:
            cpu: 150m
            memory: 512Mi
          limits:
            cpu: 400m
            memory: 768Mi
        storageSpec:
          emptyDir: {}
    prometheusOperator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
    kube-state-metrics:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
