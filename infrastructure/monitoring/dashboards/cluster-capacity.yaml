apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-capacity
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-capacity.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"min": 0, "unit": "cores"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {"datasource": "Prometheus", "expr": "sum by (node) (kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"} * on (namespace, pod) group_left(node) kube_pod_info)", "legendFormat": "requests {{node}}", "refId": "A"},
            {"datasource": "Prometheus", "expr": "sum by (node) (kube_node_status_allocatable{resource=\"cpu\", unit=\"core\"})", "legendFormat": "allocatable {{node}}", "refId": "B"}
          ],
          "title": "Node CPU requests vs allocatable",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"min": 0, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {"datasource": "Prometheus", "expr": "sum by (node) (kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"} * on (namespace, pod) group_left(node) kube_pod_info)", "legendFormat": "requests {{node}}", "refId": "A"},
            {"datasource": "Prometheus", "expr": "sum by (node) (kube_node_status_allocatable{resource=\"memory\", unit=\"byte\"})", "legendFormat": "allocatable {{node}}", "refId": "B"}
          ],
          "title": "Node memory requests vs allocatable",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"min": 0, "unit": "cores"}, "overrides": []},
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {"datasource": "Prometheus", "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\", namespace!=\"\"}[$__rate_interval]))", "legendFormat": "usage {{namespace}}", "refId": "A"},
            {"datasource": "Prometheus", "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\", unit=\"core\"})", "legendFormat": "requests {{namespace}}", "refId": "B"}
          ],
          "title": "Namespace CPU usage vs requests",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"min": 0, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [
            {"datasource": "Prometheus", "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\", namespace!=\"\"})", "legendFormat": "usage {{namespace}}", "refId": "A"},
            {"datasource": "Prometheus", "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\", unit=\"byte\"})", "legendFormat": "requests {{namespace}}", "refId": "B"}
          ],
          "title": "Namespace memory usage vs requests",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"decimals": 0, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 17},
          "id": 5,
          "options": {"footer": {"enablePagination": true, "fields": "", "reducer": ["sum"], "show": false}, "showHeader": true},
          "targets": [{"datasource": "Prometheus", "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[$__range]))", "format": "table", "instant": true, "legendFormat": "{{namespace}} / {{pod}}", "refId": "A"}],
          "title": "Pod restarts in selected range",
          "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true}, "renameByName": {"Value": "Restarts", "namespace": "Namespace", "pod": "Pod"}}}],
          "type": "table"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 17},
          "id": 6,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": "Prometheus", "expr": "sum by (namespace) (kube_pod_status_phase{phase=\"Pending\"})", "legendFormat": "{{namespace}}", "refId": "A"}],
          "title": "Pending pods",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["gateflow", "kubernetes", "capacity"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "browser",
      "title": "Cluster — Capacity",
      "uid": "gateflow-capacity",
      "version": 1
    }
