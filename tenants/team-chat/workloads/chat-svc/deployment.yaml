apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-svc
  namespace: team-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chat-svc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-svc
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: chat-svc
      nodeSelector:
        kubernetes.io/arch: arm64
        kubernetes.io/os: linux
      containers:
        - name: chat-svc
          image: acrgateflowdev7793.azurecr.io/chat-svc:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-svc-gemini
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              value: gemini-3.1-flash-lite
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: chat-svc-secrets
