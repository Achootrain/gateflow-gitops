# Values in angle brackets are identifiers, not credentials. The actual API
# key remains in Key Vault and the CSI driver creates this Secret only in-cluster.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: chat-svc-secrets
  namespace: team-chat
spec:
  provider: azure
  secretObjects:
    - secretName: chat-svc-gemini
      type: Opaque
      data:
        - objectName: gemini-api-key
          key: GEMINI_API_KEY
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<CHAT_SVC_CLIENT_ID>"
    keyvaultName: kv-gateflow-dev-7793
    cloudName: AzurePublicCloud
    tenantId: "<AZURE_TENANT_ID>"
    objects: |
      array:
        - |
          objectName: gemini-api-key
          objectType: secret
