# Usage settlement: every five minutes, archive pending campaign usage
# records at the downstream archive's contractual rate and mark them
# settled. Runs in dev on an accelerated cadence so the pipeline is
# continuously exercised; production would run this nightly.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: usage-settlement
  namespace: team-chat
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # A settlement run must never hang forever or retry blindly: a failed
      # run leaves records pending, and the next scheduled run picks them up.
      backoffLimit: 0
      activeDeadlineSeconds: 900
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: usage-settlement
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: arm64
            kubernetes.io/os: linux
          containers:
            - name: settle
              image: acrgateflowdev7793.azurecr.io/batch-reconciler:0.1.0
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.worker"]
              env:
                - name: REDIS_HOST
                  value: batch-redis
                - name: REDIS_PORT
                  value: "6379"
                - name: REDIS_DB
                  value: "0"
                # Contractual pacing of the downstream archive endpoint.
                - name: ARCHIVE_RATE_PER_SEC
                  value: "8"
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
