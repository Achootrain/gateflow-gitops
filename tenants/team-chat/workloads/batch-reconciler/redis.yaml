# Tenant-owned state for usage settlement: pending usage records, archival
# receipts, and run bookkeeping. Lives inside team-chat — tenant workloads
# must not reach into the gateway's Redis (different namespace, different
# owner, different blast radius).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-redis
  namespace: team-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: batch-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: batch-redis
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
        kubernetes.io/os: linux
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: batch-redis
  namespace: team-chat
spec:
  selector:
    app.kubernetes.io/name: batch-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
