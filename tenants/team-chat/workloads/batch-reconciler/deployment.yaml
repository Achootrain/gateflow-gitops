# Read-only settlement status API: /healthz, /metrics (Prometheus),
# /v1/status. Computes business-level counters from batch-redis so that
# short-lived settlement Jobs never need to be scraped directly.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-status
  namespace: team-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: batch-status
  template:
    metadata:
      labels:
        app.kubernetes.io/name: batch-status
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
        kubernetes.io/os: linux
      containers:
        - name: batch-status
          image: acrgateflowdev7793.azurecr.io/batch-reconciler:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: REDIS_HOST
              value: batch-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
