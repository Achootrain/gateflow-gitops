# Platform reconciler: cluster-wide infrastructure (ingress, monitoring,
# policies). Applies with flux-applier (cluster-admin) — this tree is
# platform-team-only by PR review.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 2m
  path: ./infrastructure
  prune: true
  serviceAccountName: flux-applier
  sourceRef:
    kind: GitRepository
    name: gateflow-dev # created by the Azure fluxConfiguration, same namespace
