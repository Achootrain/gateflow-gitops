# With multiTenancy.enforce, Kustomizations apply as an impersonated SA.
# The platform's own reconcilers (infrastructure.yaml / tenants.yaml) need
# cluster privileges — this SA is their identity. Tenants never reference it:
# cross-namespace refs are blocked, and it only exists in flux-system.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-applier
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-applier-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: flux-applier
    namespace: flux-system
